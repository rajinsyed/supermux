# TEMPORARY diagnostic for the ClaudeHook test timeouts on PR #17.
# Builds only the cmux-cli target, runs the claude stop hook against a stub
# socket exactly like cmuxTests' ClaudeHookLiveDeliveryHarness does, and
# captures a `sample` stack of the process if it stalls. Delete this file
# once the hang is diagnosed — it must not outlive the investigation.
name: Debug hook hang

on:
  workflow_dispatch:
  # workflow_dispatch only resolves workflows on the default branch, so this
  # temporary diagnostic fires on pushes to the PR branch instead.
  push:
    branches: [upgrade-to-0-64-20]
    paths: [.github/workflows/debug-hook-hang.yml]

jobs:
  repro:
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'warp-macos-15-arm64-6x' }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init bonsplit submodule (package resolution needs its manifest)
        run: git submodule update --init vendor/bonsplit

      - name: Capture Ghostty revision
        id: ghostty-revision
        run: echo "sha=$(git rev-parse HEAD:ghostty)" >> "$GITHUB_OUTPUT"

      # The fork pins its own ghostty SHA with no published prebuilt artifact;
      # CI survives on the runners' warm cache, so restore from the same key.
      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@v4
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ steps.ghostty-revision.outputs.sha }}

      - name: Require cached GhosttyKit
        run: |
          test -d GhosttyKit.xcframework || { echo "no cached GhosttyKit for ${{ steps.ghostty-revision.outputs.sha }} on this runner pool"; exit 1; }

      - name: Install Rust (build phases may invoke the sidecar toolchain)
        run: ./scripts/install-rust-ci.sh

      - name: Select Xcode
        run: ./scripts/select-ci-xcode.sh

      - name: Build cmux-cli only
        run: |
          set -euo pipefail
          xcodebuild -project cmux.xcodeproj -target cmux-cli -configuration Debug \
            SYMROOT=/tmp/dd/sym OBJROOT=/tmp/dd/obj build 2>&1 | tail -20
          CLI=$(find /tmp/dd -type f -name cmux -perm +111 | grep -v dSYM | head -1)
          echo "CLI=$CLI" >> "$GITHUB_ENV"
          ls -la "$CLI"

      - name: Reproduce hook run against stub socket
        run: |
          set -uo pipefail
          ROOT=$(mktemp -d /tmp/hookrepro.XXXX)
          SOCK=/tmp/hr-$$.sock
          cat > "$ROOT/stub.py" <<'EOF'
          import socket, os, sys, threading, json
          path, logpath = sys.argv[1], sys.argv[2]
          try: os.unlink(path)
          except FileNotFoundError: pass
          srv = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
          srv.bind(path); srv.listen(8)
          log = open(logpath, "a", buffering=1)
          LIVE_WS = "11111111-1111-1111-1111-111111111111"
          LIVE_SF = "22222222-2222-2222-2222-222222222222"
          def respond(payload):
              # Mirrors cmuxTests' startDeliveryTargetServer v2Response shapes.
              rid = payload.get("id"); method = payload.get("method")
              params = payload.get("params") or {}
              if method == "agent.resolve_delivery_target":
                  return {"id": rid, "ok": True, "result": {"workspace_id": LIVE_WS, "surface_id": LIVE_SF, "source": "pid"}}
              if method == "surface.list":
                  return {"id": rid, "ok": True, "result": {"surfaces": [{"id": LIVE_SF, "ref": "surface:1", "focused": True}]}}
              if method == "debug.terminals":
                  return {"id": rid, "ok": True, "result": {"terminals": []}}
              if method == "feed.push":
                  return {"id": rid, "ok": True, "result": {}}
              if method == "surface.resume.set":
                  return {"id": rid, "ok": True, "result": {"resume_binding": {}}}
              return {"id": rid, "ok": False, "error": {"code": "unrecognized_method", "message": "unexpected"}}
          def handle(conn):
              f = conn.makefile("rwb")
              for line in f:
                  text = line.decode(errors="replace").rstrip("\n")
                  log.write("RECV: " + text + "\n")
                  try:
                      payload = json.loads(text)
                      f.write((json.dumps(respond(payload)) + "\n").encode()); f.flush()
                  except Exception:
                      f.write(b"OK\n"); f.flush()
              log.write("DISCONNECT\n")
          while True:
              conn, _ = srv.accept()
              log.write("ACCEPTED\n")
              threading.Thread(target=handle, args=(conn,), daemon=True).start()
          EOF
          python3 "$ROOT/stub.py" "$SOCK" "$ROOT/server.log" &
          SERVER=$!
          sleep 1
          mkdir -p "$ROOT/home"
          echo "== binary size:"; ls -la "$CLI"
          echo "== first exec (cold — includes any Gatekeeper/XProtect scan):"
          { /usr/bin/time -p "$CLI" help >/dev/null; } 2>&1 | grep real || true
          echo "== second exec (warm):"
          { /usr/bin/time -p "$CLI" help >/dev/null; } 2>&1 | grep real || true
          INPUT='{"session_id":"repro","hook_event_name":"Stop","cwd":"'"$ROOT"'","last_assistant_message":"done"}'
          ls "$HOME/Library/Logs/DiagnosticReports/" > "$ROOT/crashes-before.txt" 2>/dev/null || true

          echo "== A) direct run with exit status + debug log:"
          START=$(date +%s)
          echo "$INPUT" | env -i HOME="$ROOT/home" PATH=/usr/bin:/bin:/usr/sbin:/sbin \
              CMUX_SOCKET_PATH="$SOCK" CMUX_CLAUDE_HOOK_STATE_PATH="$ROOT/home/state.json" \
              CMUX_CLI_SENTRY_DISABLED=1 CMUX_CLAUDE_HOOK_SENTRY_DISABLED=1 \
              CMUX_DEBUG_LOG="$ROOT/cli-debug.log" \
              CMUX_WORKSPACE_ID=33333333-3333-3333-3333-333333333333 \
              CMUX_SURFACE_ID=55555555-5555-5555-5555-555555555555 \
              CMUX_CLAUDE_PID=43210 \
              "$CLI" hooks claude stop > "$ROOT/hook.out" 2> "$ROOT/hook.err"
          STATUS=$?
          echo "== exit status: $STATUS after $(( $(date +%s) - START ))s"
          echo "== hook stdout:"; cat "$ROOT/hook.out" || true
          echo "== hook stderr:"; head -30 "$ROOT/hook.err" || true
          echo "== cli debug log:"; cat "$ROOT/cli-debug.log" 2>/dev/null || echo "(none)"
          echo "== server log:"; cat "$ROOT/server.log" || true

          echo "== B) Foundation Process spawn with pipes (mirrors runHookProcess):"
          cat > "$ROOT/spawn.swift" <<'EOF'
          import Foundation
          let cli = ProcessInfo.processInfo.environment["CLI"]!
          let sock = ProcessInfo.processInfo.environment["SOCK"]!
          let root = ProcessInfo.processInfo.environment["ROOT"]!
          let p = Process(); let so = Pipe(); let se = Pipe(); let si = Pipe()
          p.executableURL = URL(fileURLWithPath: cli)
          p.arguments = ["hooks", "claude", "stop"]
          p.environment = [
            "HOME": root + "/home", "PATH": "/usr/bin:/bin:/usr/sbin:/sbin",
            "CMUX_SOCKET_PATH": sock, "CMUX_CLAUDE_HOOK_STATE_PATH": root + "/home/state.json",
            "CMUX_CLI_SENTRY_DISABLED": "1", "CMUX_CLAUDE_HOOK_SENTRY_DISABLED": "1",
            "CMUX_DEBUG_LOG": root + "/cli-debug-b.log",
            "CMUX_WORKSPACE_ID": "33333333-3333-3333-3333-333333333333",
            "CMUX_SURFACE_ID": "55555555-5555-5555-5555-555555555555",
            "CMUX_CLAUDE_PID": "43210",
          ]
          p.standardInput = si; p.standardOutput = so; p.standardError = se
          try! p.run()
          si.fileHandleForWriting.write(Data("{\"session_id\":\"repro-b\",\"hook_event_name\":\"Stop\",\"cwd\":\"\(root)\",\"last_assistant_message\":\"done\"}".utf8))
          try? si.fileHandleForWriting.close()
          let sem = DispatchSemaphore(value: 0)
          DispatchQueue.global().async { p.waitUntilExit(); sem.signal() }
          let timedOut = sem.wait(timeout: .now() + 10) == .timedOut
          if timedOut {
            print("B TIMED OUT — sampling pid \(p.processIdentifier)")
            let s = Process(); s.executableURL = URL(fileURLWithPath: "/usr/bin/sample")
            s.arguments = ["\(p.processIdentifier)", "4", "-file", root + "/sample-b.txt"]
            try? s.run(); s.waitUntilExit()
            p.terminate(); _ = sem.wait(timeout: .now() + 2)
          }
          let out = String(data: so.fileHandleForReading.readDataToEndOfFile(), encoding: .utf8) ?? ""
          let err = String(data: se.fileHandleForReading.readDataToEndOfFile(), encoding: .utf8) ?? ""
          print("B timedOut=\(timedOut) status=\(p.isRunning ? -999 : p.terminationStatus) reason=\(p.terminationReason.rawValue)")
          print("B stdout: \(out)")
          print("B stderr: \(err.prefix(500))")
          EOF
          CLI="$CLI" SOCK="$SOCK" ROOT="$ROOT" swift "$ROOT/spawn.swift" || true
          echo "== cli debug log B:"; cat "$ROOT/cli-debug-b.log" 2>/dev/null || echo "(none)"
          echo "== sample B (first 120 lines):"; head -120 "$ROOT/sample-b.txt" 2>/dev/null || echo "(no sample)"
          echo "== server log (full):"; cat "$ROOT/server.log" || true
          echo "== new crash reports:"
          ls "$HOME/Library/Logs/DiagnosticReports/" 2>/dev/null > "$ROOT/crashes-after.txt" || true
          comm -13 "$ROOT/crashes-before.txt" "$ROOT/crashes-after.txt" 2>/dev/null | head -5 || true
          for f in $(comm -13 "$ROOT/crashes-before.txt" "$ROOT/crashes-after.txt" 2>/dev/null | grep -i cmux | head -2); do
            echo "== crash report $f:"; head -60 "$HOME/Library/Logs/DiagnosticReports/$f"
          done
          kill "$SERVER" 2>/dev/null || true
          echo "== done at $(date +%T)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hook-hang-diagnostics
          path: /tmp/hookrepro.*
          if-no-files-found: ignore
